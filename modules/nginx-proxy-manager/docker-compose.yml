# =============================================================================
# Nginx Proxy Manager — Reverse proxy with Let's Encrypt SSL
# =============================================================================
# Provides a web-based reverse proxy with automatic HTTPS certificate
# management for all endurance services.
#
# UI Access:   http://endurance:81
#              Default credentials: admin@example.com / changeme
#              CHANGE THE PASSWORD ON FIRST LOGIN.
#
# Default domain mappings (configure via UI or see .env.example):
#   endurance.local          → Portainer HTTPS (9443)
#   endurance.local/mirror   → MagicMirror²  (8181)
#   endurance.local/pihole   → Pi-hole web UI (8080)
#   endurance.local/uptime   → Uptime Kuma   (3001)
#   endurance.local/api      → Backend API   (8000)
#
# Ports:
#   80  — HTTP (redirect to HTTPS)
#   443 — HTTPS
#   81  — NPM Admin UI
#
# For local domains with Let's Encrypt, use DNS-01 challenge or a
# split-horizon DNS entry pointing endurance.local → server LAN IP.
# =============================================================================

services:
  npm:
    image: jc21/nginx-proxy-manager:2.12.3
    container_name: endurance-npm
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # Required to bind ports 80 and 443 (< 1024)
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    ports:
      - "80:80"            # HTTP  — public + LAN (redirects to HTTPS)
      - "443:443"          # HTTPS — public + LAN
      - "81:81"            # NPM Admin UI — restrict to LAN via UFW
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    environment:
      TZ: ${TZ:-Europe/Madrid}
      # Disable the built-in SQLite creation check on every start (performance)
      DISABLE_IPV6: ${DISABLE_IPV6:-false}
    healthcheck:
      test: ["CMD", "/bin/check-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - endurance_frontend

volumes:
  npm_data:
    driver: local
  npm_letsencrypt:
    driver: local

networks:
  endurance_frontend:
    external: true
