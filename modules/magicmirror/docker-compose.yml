# =============================================================================
# MagicMirror² — Smart mirror / dashboard
# =============================================================================
# Displays time, weather, calendar (iCloud ICS) and other widgets.
# Accessible from any browser on the LAN.
#
# Access: http://endurance:8181
# =============================================================================

services:
  magicmirror:
    image: karsten13/magicmirror:v2.30.0
    container_name: endurance-magicmirror
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8181:8080"       # Web interface on LAN
    volumes:
      - ./config:/opt/magic_mirror/config:ro
      - ./modules:/opt/magic_mirror/modules:ro
      - ./css:/opt/magic_mirror/css:ro
    tmpfs:
      - /tmp
    environment:
      TZ: ${TZ:-Europe/Madrid}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - endurance_frontend

networks:
  endurance_frontend:
    external: true
