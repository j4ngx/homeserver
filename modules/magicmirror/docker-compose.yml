# =============================================================================
# MagicMirror² — Smart mirror / dashboard
# =============================================================================
# Displays time, weather, calendar (iCloud ICS) and other widgets.
# Accessible from any browser on the LAN.
#
# Access: http://endurance:8181
# =============================================================================

services:
  magicmirror:
    image: karsten13/magicmirror:v2.30.0
    container_name: endurance-magicmirror
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8181:8080"       # Web interface on LAN
    volumes:
      # NOT :ro — entrypoint runs envsubst on config.js.template to generate config.js
      - ./config:/opt/magic_mirror/config
      # NOT :ro — entrypoint must write modules/default on first start,
      # and custom third-party modules (e.g. MMM-Pages) live here too.
      - ./modules:/opt/magic_mirror/modules
      # NOT :ro — entrypoint copies css files here on first start.
      - ./css:/opt/magic_mirror/css
    tmpfs:
      - /tmp
    environment:
      TZ: ${TZ:-Europe/Madrid}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - endurance_frontend

networks:
  endurance_frontend:
    external: true
