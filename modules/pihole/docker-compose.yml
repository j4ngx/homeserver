# =============================================================================
# Pi-hole — Network-wide ad blocker
# =============================================================================
# DNS sinkhole that blocks ads and trackers for all devices on the LAN.
#
# Access:  http://endurance:8080/admin  (web UI)
# DNS:     Point LAN devices or router DNS to endurance's IP (port 53)
# =============================================================================

services:
  pihole:
    image: pihole/pihole:2024.07.0
    container_name: endurance-pihole
    restart: unless-stopped
    hostname: endurance-pihole
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN     # Required for DHCP and raw socket operations
      - NET_RAW
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    ports:
      - "53:53/tcp"          # DNS (TCP)
      - "53:53/udp"          # DNS (UDP)
      - "8080:80/tcp"        # Web UI (avoid 80 conflicts)
    environment:
      TZ: ${TZ:-Europe/Madrid}
      WEBPASSWORD: ${PIHOLE_PASSWORD:-changeme}
      DNSMASQ_LISTENING: all
      PIHOLE_DNS_: ${UPSTREAM_DNS:-1.1.1.1;8.8.8.8}
      FTLCONF_LOCAL_IPV4: ${SERVER_IP:-192.168.1.50}
    volumes:
      - pihole_config:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    healthcheck:
      test: ["CMD", "dig", "+norecurse", "+retry=0", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - endurance_frontend

volumes:
  pihole_config:
    driver: local
  pihole_dnsmasq:
    driver: local

networks:
  endurance_frontend:
    external: true
